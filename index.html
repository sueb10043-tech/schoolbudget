<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 예산 관리 시스템</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; -webkit-font-smoothing: antialiased; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ✅ 사용자님의 실제 정보 및 GAS 주소 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCgmF_cfpNOaImXQ7yY0UPOZ5eDuH1whp7NKTdEAvjPWGO6y5GzvafqySyy3Oul1l/exec?sheet=교사용_예산";
        const SOURCE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1NZTWMtsmhCxkjZ1rEsonWUpNZaG4HOXstFBLyjY7UrY/edit?gid=0#gid=0";

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                wallet: <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5M18 12a2 2 0 0 0 0 4h4v-4Z"/>,
                "bar-chart": <g><rect x="18" y="3" width="4" height="18" rx="1"/><rect x="11" y="8" width="4" height="13" rx="1"/><rect x="4" y="13" width="4" height="8" rx="1"/></g>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                "chevron-right": <path d="m9 18 6-6-6-6"/>,
                "arrow-left": <path d="m12 19-7-7 7-7M5 12h14"/>,
                "edit-2": <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/>,
                "trash-2": <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>,
                check: <path d="M20 6 9 17l-5-5"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                link: <g><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" /></g>,
                loader: <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48 2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48 2.83-2.83"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [budgets, setBudgets] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [isInitialLoaded, setIsInitialLoaded] = useState(false);
            
            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedBudgetId, setSelectedBudgetId] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [isAddingBudget, setIsAddingBudget] = useState(false);
            const [isAddingTransaction, setIsAddingTransaction] = useState(false);

            const [newBudget, setNewBudget] = useState({ name: '', method: '', plannedAmount: 0, notes: '' });
            const [newTransaction, setNewTransaction] = useState({ date: new Date().toISOString().split('T')[0], description: '', location: '', notes: '', amount: 0 });

            // 1. 데이터 불러오기 (사용자 GAS 규격: JSON 파싱 필요)
            useEffect(() => {
                fetch(GAS_URL)
                    .then(r => r.json())
                    .then(data => {
                        // 시트에 저장된 값이 문자열 형태의 JSON이므로 다시 객체로 변환
                        let parsed = data;
                        if (typeof data === 'string') {
                            try { parsed = JSON.parse(data); } catch(e) { parsed = {}; }
                        }
                        
                        if (parsed) {
                            setBudgets(parsed.budgets || []);
                            setTransactions(parsed.transactions || []);
                        }
                        setIsInitialLoaded(true);
                        setLoading(false);
                    })
                    .catch(() => {
                        setLoading(false);
                        setIsInitialLoaded(true); // 실패해도 잠금은 해제 (새 저장 가능하도록)
                    });
            }, []);

            // 2. 동기화 (사용자 GAS 규격: { data: "...", range: "A1" } 형태로 전송)
            const sync = async (b, t) => {
                if (!isInitialLoaded) return;
                setSyncing(true);
                
                // 사용자님의 GAS doPost가 기대하는 구조 생성
                const payload = {
                    data: JSON.stringify({ budgets: b, transactions: t }),
                    range: "A1"
                };

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setTimeout(() => setSyncing(false), 1200);
                } catch (e) {
                    setSyncing(false);
                }
            };

            const fmt = (n) => new Intl.NumberFormat('ko-KR').format(n || 0) + '원';
            const toNum = (s) => Number(s.toString().replace(/[^0-9]/g, '')) || 0;
            const toDisp = (v) => v === 0 ? '' : v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

            const total = useMemo(() => {
                const p = budgets.reduce((s, b) => s + (Number(b.plannedAmount) || 0), 0);
                const u = transactions.reduce((s, t) => s + (Number(t.amount) || 0), 0);
                return { planned: p, used: u, balance: p - u };
            }, [budgets, transactions]);

            const selectedData = useMemo(() => {
                if (!selectedBudgetId) return null;
                const b = budgets.find(x => x.id === selectedBudgetId);
                if (!b) return null;
                const rel = transactions.filter(t => t.budgetId === selectedBudgetId);
                const used = rel.reduce((sum, t) => sum + (Number(t.amount) || 0), 0);
                return { ...b, used, balance: (Number(b.plannedAmount) || 0) - used, history: rel.sort((a,b) => new Date(b.date) - new Date(a.date)) };
            }, [selectedBudgetId, budgets, transactions]);

            const doAddB = (e) => {
                e.preventDefault();
                const next = [...budgets, { ...newBudget, id: Date.now().toString() }];
                setBudgets(next); sync(next, transactions);
                setNewBudget({ name: '', method: '', plannedAmount: 0, notes: '' }); setIsAddingBudget(false);
            };

            const doAddT = (e) => {
                e.preventDefault();
                const next = [...transactions, { ...newTransaction, id: Date.now().toString(), budgetId: selectedBudgetId }];
                setTransactions(next); sync(budgets, next);
                setNewTransaction({ date: new Date().toISOString().split('T')[0], description: '', location: '', notes: '', amount: 0 }); setIsAddingTransaction(false);
            };

            const doSaveEdit = (type, id) => {
                let nb = budgets, nt = transactions;
                if (type === 'budget') nb = budgets.map(x => x.id === id ? { ...x, ...editForm } : x);
                else nt = transactions.map(x => x.id === id ? { ...x, ...editForm } : x);
                setBudgets(nb); setTransactions(nt); sync(nb, nt); setEditingId(null);
            };

            if (loading) return <div className="flex items-center justify-center h-screen"><Icon name="loader" className="w-10 h-10 animate-spin text-amber-500" /></div>;

            return (
                <div className="max-w-7xl mx-auto px-4 pb-20 text-center">
                    <header className="py-6 flex items-center justify-between border-b mb-6 bg-white -mx-4 px-6 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-amber-500 rounded-2xl text-white shadow-lg"><Icon name="wallet" className="w-6 h-6" /></div>
                            <h1 className="text-2xl font-black tracking-tighter text-gray-800">학교 예산 관리 시스템</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            {syncing && <div className="flex items-center gap-1 text-amber-600 mr-2 animate-pulse"><Icon name="loader" className="w-3 h-3 animate-spin" /><span className="text-[10px] font-bold uppercase tracking-tighter">Saving</span></div>}
                            <a href={SOURCE_SHEET_URL} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-100 text-gray-600 hover:bg-amber-100 hover:text-amber-700 transition-all text-[10px] font-bold uppercase tracking-wider mr-1 border border-gray-200">
                                <Icon name="link" className="w-3 h-3" /> Data Source
                            </a>
                            <span className="text-[10px] font-black uppercase px-3 py-1.5 rounded-full shadow-sm border bg-green-50 text-green-600 border-green-100">Cloud Connected</span>
                        </div>
                    </header>

                    {currentView === 'dashboard' ? (
                        <div className="space-y-6 fade-in">
                            <div className="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6 px-10">
                                <div className="flex items-center gap-3 text-left">
                                    <div className="p-2 bg-amber-50 rounded-xl text-amber-500"><Icon name="bar-chart" className="w-6 h-6" /></div>
                                    <h2 className="text-xl font-black text-gray-700">예산 집행 현황</h2>
                                </div>
                                <div className="flex gap-8 items-center font-bold">
                                    <div className="text-center"><p className="text-[10px] text-gray-400 uppercase mb-1">총 편성액</p><p className="text-lg text-gray-800">{fmt(total.planned)}</p></div>
                                    <div className="h-8 w-px bg-gray-100"></div>
                                    <div className="text-center"><p className="text-[10px] text-gray-400 uppercase mb-1">총 사용액</p><p className="text-lg text-gray-900">{fmt(total.used)}</p></div>
                                    <div className="h-8 w-px bg-gray-100"></div>
                                    <div className="text-center"><p className="text-[10px] text-red-400 uppercase mb-1 text-center">현재 잔액</p><p className="text-xl font-black text-red-600">{fmt(total.balance)}</p></div>
                                </div>
                                <button onClick={() => setIsAddingBudget(!isAddingBudget)} className="bg-amber-500 text-white px-6 py-2.5 rounded-2xl font-bold text-sm shadow-lg hover:bg-amber-600 active:scale-95 transition-all flex items-center gap-2">
                                    <Icon name="plus" /> 새 사업 추가
                                </button>
                            </div>

                            {isAddingBudget && (
                                <div className="bg-white p-6 rounded-3xl border border-amber-100 shadow-xl mb-6">
                                    <form onSubmit={doAddB} className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                        {[ {id:'name', label:'예산명'}, {id:'method', label:'사용 방법'}, {id:'plannedAmount', label:'편성 금액'}, {id:'notes', label:'비고'} ].map(f => (
                                            <div key={f.id} className="space-y-1">
                                                <label className="text-[10px] font-black text-amber-700 uppercase block">{f.label}</label>
                                                <input required={f.id !== 'notes'} className="w-full px-3 py-2.5 rounded-xl border-2 border-gray-50 focus:border-amber-400 outline-none text-sm text-center font-bold" value={f.id === 'plannedAmount' ? toDisp(newBudget[f.id]) : newBudget[f.id]} onChange={e => setNewBudget({ ...newBudget, [f.id]: f.id === 'plannedAmount' ? toNum(e.target.value) : e.target.value })} />
                                            </div>
                                        ))}
                                        <div className="flex items-end gap-2"><button type="submit" className="flex-1 bg-gray-900 text-white py-3 rounded-2xl font-bold active:scale-95">저장</button><button type="button" onClick={() => setIsAddingBudget(false)} className="px-3 py-3 text-gray-400 font-bold text-sm">취소</button></div>
                                    </form>
                                </div>
                            )}

                            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden mt-6">
                                <table className="w-full border-collapse table-fixed text-center">
                                    <thead className="bg-[#FFF8E1] border-b border-amber-100">
                                        <tr className="text-sm font-bold text-gray-600">
                                            <th className="p-4 w-[20%]">예산명</th>
                                            <th className="p-4 w-[12%]">사용 방법</th>
                                            <th className="p-4 w-[140px]">편성 금액</th>
                                            <th className="p-4 w-[140px]">사용 금액</th>
                                            <th className="p-4 w-[110px] text-red-600">잔액</th>
                                            <th className="p-4 w-auto">비고</th>
                                            <th className="p-4 w-[95px]"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50 text-sm font-bold text-center">
                                        {budgets.map(b => {
                                            const u = transactions.filter(t => t.budgetId === b.id).reduce((s,t) => s + (Number(t.amount) || 0), 0);
                                            const isEdit = editingId === b.id;
                                            return (
                                                <tr key={b.id} className="hover:bg-amber-50/10 transition-colors">
                                                    <td className="p-4">
                                                        {isEdit ? <input className="w-full text-center border-2 border-amber-300 rounded font-black outline-none" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} /> : 
                                                        <button onClick={() => { setSelectedBudgetId(b.id); setCurrentView('detail'); }} className="text-gray-900 hover:text-amber-500 inline-flex items-center gap-1 justify-center truncate w-full">{b.name} <Icon name="chevron-right" className="w-3 h-3 opacity-30" /></button>}</td>
                                                    <td className="p-4 text-gray-900 font-bold">{isEdit ? <input className="w-full text-center border border-amber-300 rounded outline-none" value={editForm.method} onChange={e => setEditForm({...editForm, method: e.target.value})} /> : (b.method || '-')}</td>
                                                    <td className="p-4 text-gray-900 font-bold">{isEdit ? <input className="w-full text-center border border-amber-300 rounded outline-none" value={toDisp(editForm.plannedAmount)} onChange={e => setEditForm({...editForm, plannedAmount: toNum(e.target.value)})} /> : fmt(b.plannedAmount)}</td>
                                                    <td className="p-4 text-gray-900 font-normal">{fmt(u)}</td>
                                                    <td className="p-4 text-red-600 text-[15px] font-black">{fmt((Number(b.plannedAmount) || 0) - u)}</td>
                                                    <td className="p-4 text-xs text-gray-800 truncate font-bold">{isEdit ? <input className="w-full text-center border border-amber-300 rounded outline-none" value={editForm.notes} onChange={e => setEditForm({...editForm, notes: e.target.value})} /> : (b.notes || '-')}</td>
                                                    <td className="p-4"><div className="flex gap-2 justify-center">{isEdit ? <><button onClick={() => doSaveEdit('budget', b.id)} className="text-green-600 p-1"><Icon name="check" /></button><button onClick={() => setEditingId(null)} className="text-gray-400 p-1"><Icon name="x" /></button></> :
                                                        <><button onClick={() => { setEditingId(b.id); setEditForm({...b}); }} className="p-1.5 text-gray-300 hover:text-amber-500 transition-colors"><Icon name="edit-2" /></button>
                                                          <button onClick={() => { if(confirm('삭제할까요?')) { const next = budgets.filter(x => x.id !== b.id); setBudgets(next); sync(next, transactions); }}} className="p-1.5 text-gray-300 hover:text-red-500"><Icon name="trash-2" /></button></>}</div></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ) : (
                        /* DETAIL VIEW */
                        <div className="space-y-4 fade-in">
                            <div className="flex px-2"><button onClick={() => { setCurrentView('dashboard'); setEditingId(null); setSelectedBudgetId(null); }} className="flex items-center gap-2 text-gray-500 hover:text-gray-900 font-bold mb-3 transition-colors text-sm"><Icon name="arrow-left" className="w-5 h-5" /> 대시보드로 돌아가기</button></div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-center md:text-left"><span className="inline-block px-3 py-1 rounded-full bg-amber-100 text-amber-700 text-sm font-black mb-2 uppercase tracking-wider">{selectedData?.method || '-'}</span><h2 className="text-3xl font-black text-gray-900 text-center">{selectedData?.name}</h2></div>
                                <div className="flex gap-4 font-bold">
                                    <div className="text-center px-8 py-3 bg-gray-50 rounded-2xl"><p className="text-xs text-gray-500 font-black uppercase mb-1">사용액</p><p className="text-2xl font-normal text-gray-900">{fmt(selectedData?.used)}</p></div>
                                    <div className="text-center px-8 py-3 bg-gray-50 rounded-2xl border-l-2 border-gray-200"><p className="text-xs text-gray-500 font-black uppercase mb-1 text-center">잔액</p><p className="text-3xl font-black text-red-600">{fmt(selectedData?.balance)}</p></div>
                                </div>
                            </div>
                            <div className="flex justify-between items-center mt-3 mb-2 px-1">
                                <h3 className="text-lg font-black text-gray-700">지출 내역 관리</h3>
                                <button onClick={() => setIsAddingTransaction(!isAddingTransaction)} className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl shadow-md active:scale-95 text-sm font-bold flex items-center gap-2">
                                    <Icon name={isAddingTransaction ? 'x' : 'plus'} /> {isAddingTransaction ? '닫기' : '내역 추가'}
                                </button>
                            </div>
                            {isAddingTransaction && (
                                <div className="bg-amber-50 p-6 rounded-[2rem] border border-amber-100 mt-3 mb-4 shadow-inner">
                                    <form onSubmit={doAddT} className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
                                        <div className="md:col-span-2 space-y-1"><label className="text-xs font-black text-amber-700 block text-center">일자</label><input type="date" required className="w-full px-3 py-2.5 rounded-xl border border-amber-200 bg-white text-sm text-center font-bold outline-none" value={newTransaction.date} onChange={e => setNewTransaction({...newTransaction, date: e.target.value})} /></div>
                                        <div className="md:col-span-2 space-y-1"><label className="text-xs font-black text-amber-700 block text-center">내역</label><input required className="w-full px-3 py-2.5 rounded-xl border border-amber-200 bg-white text-sm text-center font-bold outline-none" value={newTransaction.description} onChange={e => setNewTransaction({...newTransaction, description: e.target.value})} /></div>
                                        <div className="md:col-span-2 space-y-1"><label className="text-xs font-black text-amber-700 block text-center">사용처</label><input className="w-full px-3 py-2.5 rounded-xl border border-amber-200 bg-white text-sm text-center font-bold outline-none" value={newTransaction.location} onChange={e => setNewTransaction({...newTransaction, location: e.target.value})} /></div>
                                        <div className="md:col-span-2 space-y-1 font-bold text-red-600 text-center"><label className="text-xs font-black text-red-700 block text-center">금액 (원)</label><input required className="w-full px-3 py-2.5 rounded-xl border border-amber-200 bg-white text-sm text-center font-black outline-none" value={toDisp(newTransaction.amount)} onChange={e => setNewTransaction({...newTransaction, amount: toNum(e.target.value)})} /></div>
                                        <div className="md:col-span-2 space-y-1 text-center"><label className="text-xs font-black text-amber-700 block text-center">비고</label><input className="w-full px-3 py-2.5 rounded-xl border border-amber-200 bg-white text-sm text-center font-bold outline-none" value={newTransaction.notes} onChange={e => setNewTransaction({...newTransaction, notes: e.target.value})} /></div>
                                        <div className="md:col-span-2 flex gap-2"><button type="submit" className="flex-1 bg-amber-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-md">기록</button><button type="button" onClick={() => setIsAddingTransaction(false)} className="px-3 text-amber-700 font-bold text-xs">취소</button></div>
                                    </form>
                                </div>
                            )}
                            <div className="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden mt-3 text-center">
                                <table className="w-full border-collapse table-fixed text-center">
                                    <thead className="bg-gray-50/80 border-b border-gray-100 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">
                                        <tr><th className="p-4 w-36 text-center">날짜</th><th className="p-4 w-auto text-center">사용 내역</th><th className="p-4 w-36 text-center">사용처</th><th className="p-4 w-32 text-center">금액</th><th className="p-4 w-48 text-center">비고</th><th className="p-4 w-24"></th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 text-sm font-bold text-center">
                                        {selectedData?.history.map(t => {
                                            const isEditTx = editingId === t.id;
                                            return (
                                                <tr key={t.id} className="hover:bg-gray-50/50 transition-all">
                                                    <td className="p-4 font-mono text-gray-700 text-xs text-center">{isEditTx ? <input type="date" className="w-full text-center border-2 border-amber-300 rounded font-bold" value={editForm.date} onChange={e => setEditForm({...editForm, date: e.target.value})} /> : t.date}</td>
                                                    <td className="p-4 text-gray-900 font-bold text-center">{isEditTx ? <input className="w-full text-center border border-amber-300 rounded font-bold outline-none" value={editForm.description} onChange={e => setEditForm({...editForm, description: e.target.value})} /> : t.description}</td>
                                                    <td className="p-4 text-gray-800 font-bold text-center">{isEditTx ? <input className="w-full text-center border border-amber-300 rounded font-bold outline-none" value={editForm.location} onChange={e => setEditForm({...editForm, location: e.target.value})} /> : (t.location || '-')}</td>
                                                    <td className="p-4 text-gray-900 font-black text-center">{isEditTx ? <input className="w-full text-center border border-amber-300 rounded font-bold outline-none" value={toDisp(editForm.amount)} onChange={e => setEditForm({...editForm, amount: toNum(e.target.value)})} /> : fmt(t.amount)}</td>
                                                    <td className="p-4 text-xs text-gray-900 truncate font-bold text-center">{isEditTx ? <input className="w-full text-center border border-amber-300 rounded font-bold outline-none" value={editForm.notes} onChange={e => setEditForm({...editForm, notes: e.target.value})} /> : (t.notes || '-')}</td>
                                                    <td className="p-4 text-center"><div className="flex gap-2 justify-center">{isEditTx ? <><button onClick={() => doSaveEdit('transaction', t.id)} className="text-green-600 p-1"><Icon name="check" /></button><button onClick={() => setEditingId(null)} className="text-gray-400 p-1"><Icon name="x" /></button></> :
                                                        <><button onClick={() => { setEditingId(t.id); setEditForm({...t}); }} className="p-1.5 text-gray-300 hover:text-amber-500 rounded"><Icon name="edit-2" /></button><button onClick={() => { if(confirm('삭제할까요?')) { const next = transactions.filter(x => x.id !== t.id); setTransactions(next); sync(budgets, next); }}} className="p-1.5 text-gray-300 hover:text-red-500 rounded"><Icon name="trash-2" /></button></>}</div></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
